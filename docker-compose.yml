version: "3.9"

services:
  timeseries-db:
    image: cassandra:4.1
    container_name: gridsense_cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "GridSenseCluster"
      CASSANDRA_DC: "dc1"
      HEAP_NEWSIZE: "128M"
      MAX_HEAP_SIZE: "512M"
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./cql/init.cql:/opt/init.cql
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q '^UN'"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - default

  # Rule 1 Implementation: Helper execution step to bypass Cassandra entrypoint limitations
  cassandra-init-helper:
    image: cassandra:4.1
    container_name: gridsense_cassandra_init
    depends_on:
      timeseries-db:
        condition: service_healthy
    volumes:
      - ./cql/init.cql:/opt/init.cql
    command: /bin/bash -c "cqlsh timeseries-db -f /opt/init.cql && echo 'Cassandra Tables Initialized Successfully.'"
    networks:
      - default

  graph-db:
    image: neo4j:5-community
    container_name: gridsense_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "http://localhost:7474"]
      interval: 15s
      timeout: 5s
      retries: 8
    networks:
      - default

  catalog-db:
    image: mongo:7.0
    container_name: gridsense_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD}"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - default

  billing-db:
    image: postgres:15-alpine
    container_name: gridsense_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  cache:
    image: redis:7-alpine
    container_name: gridsense_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gridsense_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      timeseries-db:
        condition: service_healthy
      graph-db:
        condition: service_healthy
      catalog-db:
        condition: service_healthy
      billing-db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - default

  # Rule 4 Implementation: Automated environment database seeder runner service
  seed:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gridsense_seeder_runner
    env_file:
      - .env
    command: ["python", "scripts/seed.py"]
    depends_on:
      api:
        condition: service_started
      graph-db:
        condition: service_healthy
      catalog-db:
        condition: service_healthy
      billing-db:
        condition: service_healthy
    networks:
      - default

volumes:
  cassandra_data:
  neo4j_data:
  mongo_data:
  pg_data:
  redis_data:

networks:
  default:
    name: gridsense_net